# ============================================
# auth-service: Static / framework-only defaults
# --------------------------------------------
# Anything ENV-SPECIFIC (DB URL, JWT secret, SNS ARN, AWS region)
# is injected at runtime via the K8s ConfigMap + Secret bound to
# the pod (envFrom). Spring Boot env-var binding rule:
#   spring.datasource.url -> SPRING_DATASOURCE_URL
#   app.jwt.secret        -> APP_JWT_SECRET
#   aws.sns.topic-arn     -> AWS_SNS_TOPIC_ARN
# ============================================

spring.application.name=auth-service
server.port=8080

# Graceful shutdown so our preStop hook + SIGTERM finish in-flight requests.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Static datasource framework config (not env-specific).
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate defaults.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
