########################################
# cart-service ServiceAccount
#
# Bare ServiceAccount with no IRSA annotation — cart-service
# does not currently call any AWS services.
########################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cart-service-sa
  namespace: shopease-webapp-development
  labels:
    app: cart-service-deployment
    app.kubernetes.io/name: cart-service
    app.kubernetes.io/part-of: shopease-webapp
automountServiceAccountToken: true
