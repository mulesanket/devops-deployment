# ============================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service-deployment
  namespace: shopease-webapp-development
  labels:
    app: cart-service-deployment

spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart-service-deployment
  template:
    metadata:
      labels:
        app: cart-service-deployment
    spec:
      containers:
      - name: cart-service-workload
        image: 483829975256.dkr.ecr.ap-south-1.amazonaws.com/cart-service:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8082

        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi

        startupProbe:
          httpGet:
            path: /api/cart/health
            port: 8082
          failureThreshold: 30
          periodSeconds: 5
          timeoutSeconds: 3

        readinessProbe:
          httpGet:
            path: /api/cart/health
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /api/cart/health
            port: 8082
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
