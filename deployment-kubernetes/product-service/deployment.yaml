apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service-deployment
  namespace: shopease-webapp-development
  labels:
    app: product-service-deployment

spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service-deployment

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

# A new Pod must stay ready for at least 10 seconds before Kubernetes considers it available.
# Good for avoiding traffic to unstable Pods.
  minReadySeconds: 10

# Kubernetes keeps last 5 ReplicaSet revisions. This helps Rollback
  revisionHistoryLimit: 5

#Kubernetes waits up to 600 seconds, meaning 10 minutes, for rollout progress.
#If new Pods do not become ready within this time, rollout is marked failed.
  progressDeadlineSeconds: 600

  template:
    metadata:
      labels:
        app: product-service-deployment

    spec:
      serviceAccountName: product-service-sa
      automountServiceAccountToken: true

      priorityClassName: shopease-high

      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault

      terminationGracePeriodSeconds: 60

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: product-service-deployment
          matchLabelKeys:
            - pod-template-hash
          nodeAffinityPolicy: Honor
          nodeTaintsPolicy: Honor

        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: product-service-deployment
          matchLabelKeys:
            - pod-template-hash
          nodeAffinityPolicy: Honor
          nodeTaintsPolicy: Honor

      containers:
        - name: product-service-workload
          image: 483829975256.dkr.ecr.ap-south-1.amazonaws.com/shopease-webapp-development-product-service:1.1.0
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8081

          envFrom:
            - configMapRef:
                name: product-service-config
            - secretRef:
                name: product-service-secret

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 15"]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi

          startupProbe:
            httpGet:
              path: /api/products/health
              port: 8081
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3

          readinessProbe:
            httpGet:
              path: /api/products/health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/products/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        - name: tmp
          emptyDir: {}








