# ============================================================================
# ExternalSecret: product-service-secret
# ----------------------------------------------------------------------------
# Syncs AWS secret "shopease/development/product-service" -> K8s Secret of
# the same name in the shopease-webapp-development namespace.
# See auth-service/external-secret.yaml for full pattern docs.
# ============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: product-service-secret
  namespace: shopease-webapp-development
  labels:
    app: product-service-deployment
    app.kubernetes.io/name: product-service
    app.kubernetes.io/part-of: shopease-webapp
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: product-service-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: shopease/development/product-service
