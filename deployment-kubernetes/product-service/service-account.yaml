########################################
# product-service ServiceAccount
#
# Bare ServiceAccount with no IRSA annotation — product-service
# does not currently call any AWS services. Using a dedicated SA
# (instead of the cluster's `default` SA) lets us add IRSA later
# without touching the Deployment, and follows least-privilege
# best practice.
########################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: product-service-sa
  namespace: shopease-webapp-development
  labels:
    app: product-service-deployment
    app.kubernetes.io/name: product-service
    app.kubernetes.io/part-of: shopease-webapp
automountServiceAccountToken: true
