apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: shopease-critical
  labels:
    app.kubernetes.io/part-of: shopease-webapp
value: 1000000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: >-
  Critical user-facing services (auth). Will preempt lower-priority
  pods when resources are tight.

---

apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: shopease-high
  labels:
    app.kubernetes.io/part-of: shopease-webapp
value: 100000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: >-
  High-priority business services (product, cart, order).

---

apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: shopease-medium
  labels:
    app.kubernetes.io/part-of: shopease-webapp
value: 10000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: >-
  Medium-priority internal tools and dashboards.

---

apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: shopease-low
  labels:
    app.kubernetes.io/part-of: shopease-webapp
value: 100
globalDefault: false
preemptionPolicy: Never
description: >-
  Best-effort batch jobs. Never preempts other workloads.
