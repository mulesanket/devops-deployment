# ============================================
# Shopease: Cluster-wide PriorityClasses
# Author: Sanket Mule
#
# Purpose
# -------
# Assigns scheduling priority to ShopEase workloads so the
# scheduler knows which pods are most important during:
#   - Node pressure (out of CPU/memory)
#   - Cluster Autoscaler / Karpenter consolidation
#   - Spot interruptions
#   - Preemption decisions
#
# Conventions
# -----------
# Higher value = higher priority. We leave 10x gaps between
# tiers so new tiers can be inserted later without renumbering.
#
# Built-in references (do NOT collide with these):
#   system-node-critical    = 2_000_001_000
#   system-cluster-critical = 2_000_000_000
#
# All ShopEase tiers stay well below those, so we never
# preempt kubelet, CNI, kube-proxy, etc.
# ============================================

---
# Tier 1 — CRITICAL: user login & session boundary
# Loss of this tier == 100% of the site is broken
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: shopease-critical
  labels:
    app.kubernetes.io/part-of: shopease-webapp
value: 1000000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: >-
  Critical user-facing services (auth). Will preempt lower-priority
  pods when resources are tight.

---
# Tier 2 — HIGH: core revenue path
# Browse → cart → checkout → order. Site is degraded without these
# but users can still reach the login page.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: shopease-high
  labels:
    app.kubernetes.io/part-of: shopease-webapp
value: 100000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: >-
  High-priority business services (product, cart, order).

---
# Tier 3 — MEDIUM: reserved for future workloads
# (Reports, analytics dashboards, admin tools, etc.)
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: shopease-medium
  labels:
    app.kubernetes.io/part-of: shopease-webapp
value: 10000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: >-
  Medium-priority internal tools and dashboards.

---
# Tier 4 — LOW: best-effort batch / cron / one-off jobs
# Never preempts anything. Will be the first to be evicted.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: shopease-low
  labels:
    app.kubernetes.io/part-of: shopease-webapp
value: 100
globalDefault: false
preemptionPolicy: Never
description: >-
  Best-effort batch jobs. Never preempts other workloads.
