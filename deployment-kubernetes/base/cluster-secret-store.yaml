# ============================================================================
# ClusterSecretStore: aws-secrets-manager
# ----------------------------------------------------------------------------
# Defines a cluster-wide connection between External Secrets Operator (ESO)
# and AWS Secrets Manager. ANY namespace can reference this store via an
# ExternalSecret, so we only declare the connection once.
#
# Auth flow:
#   ExternalSecret (any ns) -> ClusterSecretStore -> ESO controller pod
#       -> assumes IRSA role (via ServiceAccount annotation) -> AWS STS
#       -> AWS Secrets Manager (region ap-south-1)
#
# IRSA role: shopease-webapp-development-external-secrets-irsa
# Permissions: secretsmanager:GetSecretValue|DescribeSecret on
#              shopease/development/* + kms:Decrypt on the app-secrets CMK.
# ============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/part-of: shopease-webapp
    app.kubernetes.io/managed-by: external-secrets
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        # JWT auth = use the IRSA-annotated ServiceAccount's projected token
        # to call AWS STS AssumeRoleWithWebIdentity. No static creds anywhere.
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
