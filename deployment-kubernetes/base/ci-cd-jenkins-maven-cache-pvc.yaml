# ============================================
# Shopease: Persistent Maven .m2 cache for
# Jenkins build agent pods.
#
# Author: Sanket Mule
# --------------------------------------------
# Why a PVC?
#   Without a cache, every build re-downloads
#   ~200MB of Maven dependencies (Spring Boot,
#   AWS SDK, JUnit, etc.). On a cold pod this
#   adds 2-3 minutes per build.
#
# Mounted at /root/.m2 in the "maven" container
# of the agent pod template.
#
# Access mode:
#   ReadWriteOnce is fine because we disable
#   concurrent builds per service. If we ever
#   enable concurrency we will switch to EFS
#   (ReadWriteMany) or one PVC per service.
#
# Storage class:
#   gp3 is the AWS default for EKS clusters
#   provisioned by Terraform. Adjust if your
#   cluster uses a different default SC.
# ============================================
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jenkins-maven-cache
  namespace: jenkins-cicd-agents
  labels:
    app.kubernetes.io/part-of: jenkins-ci
    app.kubernetes.io/component: maven-cache
spec:
  accessModes:
    - ReadWriteOnce
  # gp2 is the default SC on this cluster (kubectl get sc).
  # If/when the EBS CSI driver + a gp3 SC are added, switch here.
  storageClassName: gp2
  resources:
    requests:
      storage: 5Gi
