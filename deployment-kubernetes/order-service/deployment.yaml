apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-deployment
  namespace: shopease-webapp-development
  labels:
    app: order-service-deployment

spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service-deployment
  template:
    metadata:
      labels:
        app: order-service-deployment
    spec:
      containers:
      - name: order-service-workload
        image: 483829975256.dkr.ecr.ap-south-1.amazonaws.com/order-service:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8083

        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi

        startupProbe:
          httpGet:
            path: /api/orders/health
            port: 8083
          failureThreshold: 30
          periodSeconds: 5

        readinessProbe:
          httpGet:
            path: /api/orders/health
            port: 8083
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /api/orders/health
            port: 8083
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3








