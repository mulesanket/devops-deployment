########################################
# order-service ServiceAccount
#
# Bare ServiceAccount with no IRSA annotation — order-service
# does not currently call any AWS services directly.
########################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-service-sa
  namespace: shopease-webapp-development
  labels:
    app: order-service-deployment
    app.kubernetes.io/name: order-service
    app.kubernetes.io/part-of: shopease-webapp
automountServiceAccountToken: true
