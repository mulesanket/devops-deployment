# ============================================================================
# ExternalSecret: auth-service-secret
# ----------------------------------------------------------------------------
# ESO watches this resource and reconciles a native K8s Secret named
# "auth-service-secret" in this namespace, populated from the AWS secret
# "shopease/development/auth-service".
#
# `dataFrom.extract` pulls every JSON key from the AWS secret and exposes
# it as a key in the resulting K8s Secret. The deployment's
# `envFrom: secretRef: auth-service-secret` then injects them as env vars.
#
# refreshInterval: how often ESO polls AWS for changes. 1h is a sane default;
# value rotations apply to existing pods only after a restart (env vars are
# read once at process start).
# ============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-service-secret
  namespace: shopease-webapp-development
  labels:
    app: auth-service-deployment
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: shopease-webapp
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: auth-service-secret
    creationPolicy: Owner    # ESO creates+owns the K8s Secret; deletes it when ExternalSecret is deleted
  dataFrom:
    - extract:
        key: shopease/development/auth-service
