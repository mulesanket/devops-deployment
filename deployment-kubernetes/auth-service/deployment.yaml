apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-deployment
  namespace: shopease-webapp-development
  labels:
    app: auth-service-deployment

spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service-deployment

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  minReadySeconds: 10
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600

  template:
    metadata:
      labels:
        app: auth-service-deployment

    spec:
      serviceAccountName: auth-service-sa
      automountServiceAccountToken: true

      priorityClassName: shopease-critical

      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault

      terminationGracePeriodSeconds: 60

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: auth-service-deployment
          matchLabelKeys:
            - pod-template-hash
          nodeAffinityPolicy: Honor
          nodeTaintsPolicy: Honor

        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: auth-service-deployment
          matchLabelKeys:
            - pod-template-hash
          nodeAffinityPolicy: Honor
          nodeTaintsPolicy: Honor

      containers:
        - name: auth-service-workload
          # Image tag is rewritten by the CD pipeline (Jenkinsfile.cd)
          # via `sed -i "s|IMAGE_TAG_PLACEHOLDER|${GIT_SHA}|g"` right
          # before `kubectl apply`. The placeholder must stay literal
          # in git so the deployment.yaml is always valid YAML and
          # diff-friendly. The repo+region prefix is hard-coded because
          # it never changes across environments for this service.
          image: 483829975256.dkr.ecr.ap-south-1.amazonaws.com/shopease-webapp-development-auth-service:IMAGE_TAG_PLACEHOLDER
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-secret

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 15"]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi

          startupProbe:
            httpGet:
              path: /api/auth/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3

          readinessProbe:
            httpGet:
              path: /api/auth/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/auth/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        - name: tmp
          emptyDir: {}
