########################################
# auth-service ServiceAccount
#
# Annotated with the IRSA IAM role ARN so EKS injects:
#   - AWS_ROLE_ARN env var
#   - AWS_WEB_IDENTITY_TOKEN_FILE env var
#   - projected JWT token at /var/run/secrets/eks.amazonaws.com/serviceaccount/token
#
# The AWS SDK v2 in the pod auto-detects these and calls
# STS:AssumeRoleWithWebIdentity to get short-lived credentials —
# no static AWS keys required.
#
# IMPORTANT: replace <ROLE_ARN> with the value from
#   `terraform output auth_service_irsa_role_arn`
########################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service-sa
  namespace: shopease-webapp-development
  labels:
    app: auth-service-deployment
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: shopease-webapp
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::483829975256:role/shopease-webapp-development-auth-service-irsa
automountServiceAccountToken: true
