# ============================================
# TEMPORARY plain K8s Secret.
# This will be REPLACED by an ExternalSecret synced from
# AWS Secrets Manager via External Secrets Operator + IRSA
# in the secrets-refactor phase.
#
# stringData (not data) lets us write plain values; K8s
# base64-encodes them server-side. NEVER commit real prod
# values here — for now this is dev only and will be
# rotated immediately once ESO is in place.
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: shopease-webapp-development
  labels:
    app: auth-service-deployment
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: shopease-webapp

type: Opaque
stringData:
  SPRING_DATASOURCE_PASSWORD: Adminuser123
  APP_JWT_SECRET: ShopEaseSecretKey2026SuperSecureLongKeyForJWTTokenGeneration1234567890
